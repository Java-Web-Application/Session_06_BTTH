<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Danh sách sách</title>
</head>
<body>

<div th:fragment="myHeader(pageTitle)">
  <h1 th:text="${pageTitle}">Tiêu đề</h1>
  <hr>
</div>

<div th:replace=":: myHeader('DANH SÁCH SÁCH')"></div>

<table border="1" cellpadding="10" style="border-collapse: collapse;">
  <thead>
  <tr>
    <th>ID</th>
    <th>Tên sách</th>
    <th>Giá bán</th>
    <th>Hành động</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="b : ${list}"
      th:style="${b.price >= 300000} ? 'background-color: yellow; font-weight: bold;' : ''">
    <td th:text="${b.id}"></td>
    <td th:text="${b.title}"></td>
    <td th:text="${b.price} + ' VNĐ'"></td>
    <td>
      <a th:href="@{/books/{id}(id=${b.id})}">Xem chi tiết</a>
    </td>
  </tr>
  </tbody>
</table>

</body>
</html>
